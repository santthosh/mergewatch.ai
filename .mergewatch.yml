version: 1

# Bedrock model ID — any model enabled in your account works.
model: anthropic.claude-sonnet-4-20250514

# Review agents — each runs independently against the PR diff.
agents:
  - name: security
    enabled: true
    prompt: "Flag OWASP Top 10 issues, hardcoded secrets, and unsafe deserialization."

  - name: logic
    enabled: true
    prompt: "Find logic bugs, off-by-one errors, and race conditions."

  - name: style
    enabled: true
    prompt: "Enforce project conventions. Be concise."

  - name: tests
    enabled: false
    prompt: "Suggest missing unit tests for new public functions."

# Rules control when and what gets reviewed.
rules:
  max_files: 50
  ignore_patterns:
    - "*.lock"
    - "vendor/**"
    - "dist/**"
  auto_review: true
  review_on_mention: true

# "inline" for per-line comments, "summary" for a single top-level comment.
comment_style: inline
