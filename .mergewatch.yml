# MergeWatch configuration — see https://docs.mergewatch.ai/configuration/mergewatch-yml
#
# This file controls how MergeWatch reviews pull requests in this repository.
# All fields are optional; omitted fields use sensible defaults.

# Primary model for review agents (Bedrock model ID).
model: anthropic.claude-sonnet-4-20250514

# Built-in review agents — toggle each on/off.
agents:
  security: true
  bugs: true
  style: true
  summary: true
  diagram: true
  errorHandling: true
  testCoverage: false
  commentAccuracy: true

# Custom agents run alongside the built-in ones.
customAgents:
  - name: tests
    prompt: "Suggest missing unit tests for new public functions."
    severityDefault: info
    enabled: false

# Rules control when and what gets reviewed.
rules:
  maxFiles: 50
  ignorePatterns:
    - "*.lock"
    - "vendor/**"
    - "dist/**"
  autoReview: true
  reviewOnMention: true
  skipDrafts: true
  ignoreLabels:
    - skip-review

# File patterns to exclude from the diff sent to agents.
excludePatterns:
  - "**/*.lock"
  - "**/package-lock.json"
  - "**/dist/**"
  - "**/node_modules/**"

# Minimum severity to report: info | warning | critical
minSeverity: info

# Maximum findings posted per review.
maxFindings: 25
