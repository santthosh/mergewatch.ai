# =============================================================================
# MergeWatch — Deploy to Production
# =============================================================================
#
# Triggers:
#   - Push to main branch
#   - Manual dispatch from the Actions tab
#
# What it does:
#   1. Checks out the code
#   2. Sets up Node.js 20.x and AWS SAM CLI
#   3. Installs dependencies
#   4. Runs TypeScript type checking
#   5. Builds Lambda functions via SAM
#   6. Deploys to the "prod" CloudFormation stack (with changeset confirmation)
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID      — IAM user access key with deploy permissions
#   AWS_SECRET_ACCESS_KEY  — IAM user secret key
#   AWS_REGION             — Target region (e.g. us-east-1)
#
# Optional GitHub Secrets (for Amplify dashboard):
#   GITHUB_PAT_AMPLIFY     — GitHub PAT for Amplify repo access
#
# The prod environment uses:
#   - Stack name: mergewatch
#   - Stage parameter: prod
#   - SSM path: /mergewatch/prod/*
#   - DynamoDB tables: mergewatch-installations-prod, mergewatch-reviews-prod
# =============================================================================

name: Deploy to Production

on:
  # Deploy on every push to main
  push:
    branches:
      - main

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # =========================================================================
  # Job 1: Build and type-check
  # =========================================================================
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        working-directory: infra
        run: sam build --parallel --cached

      # Cache the SAM build artifacts for the deploy job
      - name: Upload SAM build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sam-build
          path: infra/.aws-sam/
          retention-days: 1

  # =========================================================================
  # Job 2: Deploy to production
  # =========================================================================
  deploy:
    name: Deploy (prod)
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      # Restore cached SAM build artifacts
      - name: Download SAM build artifacts
        uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: infra/.aws-sam/

      # Deploy to production — no-confirm-changeset since this is CI.
      # If you want manual approval, use the GitHub environment protection rules
      # (Settings > Environments > production > Required reviewers).
      - name: SAM deploy to prod
        working-directory: infra
        run: |
          sam deploy \
            --stack-name mergewatch \
            --parameter-overrides "Stage=prod" \
            --capabilities CAPABILITY_NAMED_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --tags "Project=MergeWatch Environment=prod"

      # ── Print Outputs ───────────────────────────────────────────────────
      - name: Print stack outputs
        run: |
          echo "## Production Stack Outputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          WEBHOOK_URL=$(aws cloudformation describe-stacks \
            --stack-name mergewatch \
            --query 'Stacks[0].Outputs[?OutputKey==`WebhookUrl`].OutputValue' \
            --output text)
          echo "- **Webhook URL:** \`${WEBHOOK_URL}\`" >> $GITHUB_STEP_SUMMARY

          WEBHOOK_ARN=$(aws cloudformation describe-stacks \
            --stack-name mergewatch \
            --query 'Stacks[0].Outputs[?OutputKey==`WebhookHandlerArn`].OutputValue' \
            --output text)
          echo "- **WebhookHandler ARN:** \`${WEBHOOK_ARN}\`" >> $GITHUB_STEP_SUMMARY

          AGENT_ARN=$(aws cloudformation describe-stacks \
            --stack-name mergewatch \
            --query 'Stacks[0].Outputs[?OutputKey==`ReviewAgentArn`].OutputValue' \
            --output text)
          echo "- **ReviewAgent ARN:** \`${AGENT_ARN}\`" >> $GITHUB_STEP_SUMMARY

          # Dashboard URL (only if Amplify is deployed)
          DASHBOARD_URL=$(aws cloudformation describe-stacks \
            --stack-name mergewatch \
            --query 'Stacks[0].Outputs[?OutputKey==`DashboardUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")
          if [ -n "$DASHBOARD_URL" ] && [ "$DASHBOARD_URL" != "None" ]; then
            echo "- **Dashboard URL:** \`${DASHBOARD_URL}\`" >> $GITHUB_STEP_SUMMARY
          fi
