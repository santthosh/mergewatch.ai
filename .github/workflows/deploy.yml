# =============================================================================
# MergeWatch — Build, Test, Deploy Pipeline
# =============================================================================
#
# Pipeline:
#   push to main → build & test → deploy to dev → (optional) deploy to prod
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN           — IAM role ARN for OIDC (e.g. arn:aws:iam::123456789012:role/mergewatch-github-deploy)
#   AWS_REGION             — Target region (e.g. us-west-2)
#
# Required GitHub Environments:
#   development            — no protection rules needed
#   production             — add "Required reviewers" for manual approval gate
#
# Note: The Amplify web dashboard is managed via the AWS Console, not this pipeline.
# =============================================================================

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_prod:
        description: 'Deploy to production after dev?'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-pipeline
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # Required for OIDC authentication

jobs:
  # =========================================================================
  # Stage 1: Build & Test
  # =========================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build (validate)
        working-directory: infra
        run: |
          export PATH="$GITHUB_WORKSPACE/node_modules/.bin:$PATH"
          sam build --parallel

  # =========================================================================
  # Stage 2: Deploy to Development
  # =========================================================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM build
        working-directory: infra
        run: |
          export PATH="$GITHUB_WORKSPACE/node_modules/.bin:$PATH"
          sam build --parallel

      - name: SAM deploy to dev
        working-directory: infra
        run: |
          sam deploy \
            --stack-name mergewatch-dev \
            --region "$AWS_REGION" \
            --parameter-overrides "Stage=dev DefaultBedrockModelId=us.anthropic.claude-sonnet-4-20250514-v1:0 DashboardBaseUrl=${{ vars.DASHBOARD_BASE_URL || 'https://mergewatch.ai' }}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --tags "Project=MergeWatch Environment=dev"

      - name: Print dev outputs
        if: success()
        run: |
          echo "## Development Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          WEBHOOK_URL=$(aws cloudformation describe-stacks \
            --stack-name mergewatch-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`WebhookUrl`].OutputValue' \
            --output text 2>/dev/null) || true
          if [ -n "$WEBHOOK_URL" ] && [ "$WEBHOOK_URL" != "None" ]; then
            echo "- **Webhook URL:** \`${WEBHOOK_URL}\`" >> $GITHUB_STEP_SUMMARY
          fi

  # =========================================================================
  # Stage 3: Deploy to Production (requires manual approval)
  # =========================================================================
  # This job uses the "production" GitHub environment which should have
  # "Required reviewers" enabled in Settings > Environments > production.
  # The pipeline pauses here until an authorized reviewer approves.
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.event.inputs.deploy_prod == 'true'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM build
        working-directory: infra
        run: |
          export PATH="$GITHUB_WORKSPACE/node_modules/.bin:$PATH"
          sam build --parallel

      - name: SAM deploy to prod
        working-directory: infra
        run: |
          sam deploy \
            --stack-name mergewatch \
            --region "$AWS_REGION" \
            --parameter-overrides "Stage=prod" \
            --capabilities CAPABILITY_NAMED_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --tags "Project=MergeWatch Environment=prod"

      - name: Print prod outputs
        if: success()
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          WEBHOOK_URL=$(aws cloudformation describe-stacks \
            --stack-name mergewatch \
            --query 'Stacks[0].Outputs[?OutputKey==`WebhookUrl`].OutputValue' \
            --output text 2>/dev/null) || true
          if [ -n "$WEBHOOK_URL" ] && [ "$WEBHOOK_URL" != "None" ]; then
            echo "- **Webhook URL:** \`${WEBHOOK_URL}\`" >> $GITHUB_STEP_SUMMARY
          fi
