# =============================================================================
# MergeWatch — Build, Test, Deploy Pipeline
# =============================================================================
#
# Pipeline:
#   push to main → build & test → deploy to dev → (manual approval) → deploy to prod
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID      — IAM user access key with deploy permissions
#   AWS_SECRET_ACCESS_KEY  — IAM user secret key
#   AWS_REGION             — Target region (e.g. us-east-1)
#
# Required GitHub Environments:
#   development            — no protection rules needed
#   production             — add "Required reviewers" for manual approval gate
# =============================================================================

name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pipeline
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # =========================================================================
  # Stage 1: Build & Test
  # =========================================================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        working-directory: infra
        run: sam build --parallel --cached

      - name: Upload SAM build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sam-build
          path: infra/.aws-sam/
          retention-days: 1

  # =========================================================================
  # Stage 2: Deploy to Development
  # =========================================================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Download SAM build artifacts
        uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: infra/.aws-sam/

      - name: SAM deploy to dev
        working-directory: infra
        run: |
          sam deploy \
            --stack-name mergewatch-dev \
            --parameter-overrides "Stage=dev" \
            --capabilities CAPABILITY_NAMED_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --tags "Project=MergeWatch Environment=dev"

      - name: Print dev outputs
        run: |
          echo "## Development Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          WEBHOOK_URL=$(aws cloudformation describe-stacks \
            --stack-name mergewatch-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`WebhookUrl`].OutputValue' \
            --output text)
          echo "- **Webhook URL:** \`${WEBHOOK_URL}\`" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Waiting for production approval..." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Stage 3: Deploy to Production (requires manual approval)
  # =========================================================================
  # This job uses the "production" GitHub environment which should have
  # "Required reviewers" enabled in Settings > Environments > production.
  # The pipeline pauses here until an authorized reviewer approves.
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Download SAM build artifacts
        uses: actions/download-artifact@v4
        with:
          name: sam-build
          path: infra/.aws-sam/

      - name: SAM deploy to prod
        working-directory: infra
        run: |
          sam deploy \
            --stack-name mergewatch \
            --parameter-overrides "Stage=prod" \
            --capabilities CAPABILITY_NAMED_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --tags "Project=MergeWatch Environment=prod"

      - name: Print prod outputs
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          WEBHOOK_URL=$(aws cloudformation describe-stacks \
            --stack-name mergewatch \
            --query 'Stacks[0].Outputs[?OutputKey==`WebhookUrl`].OutputValue' \
            --output text)
          echo "- **Webhook URL:** \`${WEBHOOK_URL}\`" >> $GITHUB_STEP_SUMMARY

          DASHBOARD_URL=$(aws cloudformation describe-stacks \
            --stack-name mergewatch \
            --query 'Stacks[0].Outputs[?OutputKey==`DashboardUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")
          if [ -n "$DASHBOARD_URL" ] && [ "$DASHBOARD_URL" != "None" ]; then
            echo "- **Dashboard URL:** \`${DASHBOARD_URL}\`" >> $GITHUB_STEP_SUMMARY
          fi
