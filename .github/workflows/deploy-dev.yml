# =============================================================================
# MergeWatch — Deploy to Development
# =============================================================================
#
# Triggers:
#   - Push to any branch EXCEPT main (feature branches, bugfix branches, etc.)
#   - Manual dispatch from the Actions tab
#
# What it does:
#   1. Checks out the code
#   2. Sets up Node.js 20.x and AWS SAM CLI
#   3. Installs dependencies
#   4. Runs TypeScript type checking
#   5. Builds Lambda functions via SAM
#   6. Deploys to the "dev" CloudFormation stack
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID      — IAM user access key with deploy permissions
#   AWS_SECRET_ACCESS_KEY  — IAM user secret key
#   AWS_REGION             — Target region (e.g. us-east-1)
#
# Optional GitHub Secrets (for Amplify dashboard):
#   GITHUB_PAT_AMPLIFY     — GitHub PAT for Amplify repo access
#
# The dev environment uses:
#   - Stack name: mergewatch-dev
#   - Stage parameter: dev
#   - SSM path: /mergewatch/dev/*
#   - DynamoDB tables: mergewatch-installations-dev, mergewatch-reviews-dev
# =============================================================================

name: Deploy to Development

on:
  # Deploy on every push to non-main branches
  push:
    branches-ignore:
      - main

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-dev
  cancel-in-progress: false

# Minimal permissions — we use explicit AWS credentials, not OIDC
permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy (dev)
    runs-on: ubuntu-latest
    environment: development

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── SAM CLI ─────────────────────────────────────────────────────────
      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # ── AWS Credentials ─────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      # ── Install & Type Check ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      # ── SAM Build ───────────────────────────────────────────────────────
      - name: SAM build
        working-directory: infra
        run: sam build --parallel --cached

      # ── SAM Deploy ──────────────────────────────────────────────────────
      - name: SAM deploy to dev
        working-directory: infra
        run: |
          sam deploy \
            --stack-name mergewatch-dev \
            --parameter-overrides "Stage=dev" \
            --capabilities CAPABILITY_NAMED_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --tags "Project=MergeWatch Environment=dev"

      # ── Print Outputs ───────────────────────────────────────────────────
      - name: Print stack outputs
        run: |
          echo "## Dev Stack Outputs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          WEBHOOK_URL=$(aws cloudformation describe-stacks \
            --stack-name mergewatch-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`WebhookUrl`].OutputValue' \
            --output text)
          echo "- **Webhook URL:** \`${WEBHOOK_URL}\`" >> $GITHUB_STEP_SUMMARY

          WEBHOOK_ARN=$(aws cloudformation describe-stacks \
            --stack-name mergewatch-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`WebhookHandlerArn`].OutputValue' \
            --output text)
          echo "- **WebhookHandler ARN:** \`${WEBHOOK_ARN}\`" >> $GITHUB_STEP_SUMMARY

          AGENT_ARN=$(aws cloudformation describe-stacks \
            --stack-name mergewatch-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`ReviewAgentArn`].OutputValue' \
            --output text)
          echo "- **ReviewAgent ARN:** \`${AGENT_ARN}\`" >> $GITHUB_STEP_SUMMARY
