version: 1
applications:
  - appRoot: packages/dashboard
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10.23.0
            - pnpm install --frozen-lockfile
            - pnpm -w run build
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
