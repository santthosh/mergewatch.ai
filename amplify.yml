version: 1
applications:
  - appRoot: packages/dashboard
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10.23.0
            # Install and build workspace packages from monorepo root
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm run build
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
