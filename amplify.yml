version: 1
applications:
  - appRoot: packages/dashboard
    frontend:
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@10.23.0
            # Resolve monorepo root (two levels up from packages/dashboard)
            - export MONO_ROOT="$(cd ../.. && pwd)" && echo "Monorepo root:" $MONO_ROOT
            - cd "$(cd ../.. && pwd)" && pnpm install --frozen-lockfile
            - cd "$(cd ../.. && pwd)" && pnpm run build
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
