services:
  mergewatch:
    image: ghcr.io/santthosh/mergewatch:0.1.0
    build: .
    restart: unless-stopped
    environment:
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_PRIVATE_KEY: ${GITHUB_PRIVATE_KEY:-}
      GITHUB_PRIVATE_KEY_FILE: ${GITHUB_PRIVATE_KEY_FILE:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      DATABASE_URL: postgres://postgres:postgres@db:5432/mergewatch
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      DASHBOARD_BASE_URL: ${DASHBOARD_BASE_URL:-http://localhost:3001}
      PORT: "3000"
    # To use GITHUB_PRIVATE_KEY_FILE instead of inline GITHUB_PRIVATE_KEY,
    # uncomment the volumes section and set GITHUB_PRIVATE_KEY_FILE=/app/github-app.pem
    # volumes:
    #   - ./github-app.pem:/app/github-app.pem:ro
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  dashboard:
    image: ghcr.io/santthosh/mergewatch-dashboard:0.1.0
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    restart: unless-stopped
    environment:
      DEPLOYMENT_MODE: self-hosted
      DATABASE_URL: postgres://postgres:postgres@db:5432/mergewatch
      NEXTAUTH_URL: ${DASHBOARD_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3001:3001"
    depends_on:
      mergewatch:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mergewatch
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
